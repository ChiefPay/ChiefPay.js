openapi: 3.1.1
components:
  examples: {}
  headers: {}
  parameters: {}
  requestBodies: {}
  responses: {}
  schemas:
    ErrorStatusCode:
      type: string
      enum:
        - INVALID_ARGUMENT
        - NOT_FOUND
        - ALREADY_EXISTS
        - INTERNAL
        - UNAUTHENTICATED
        - PERMISSION_DENIED
    ErrorResponse:
      properties:
        code:
          $ref: '#/components/schemas/ErrorStatusCode'
        errors:
          items:
            type: string
          type: array
      required:
        - code
        - errors
      type: object
      additionalProperties: false
    ChainTokenStatic:
      properties:
        chain:
          type: string
          description: Chain name
        token:
          type: string
          description: Token name
        methodName:
          type: string
          description: Payment method name (token + chain)
        address:
          type: string
          description: Payment address
      required:
        - chain
        - token
        - methodName
        - address
      type: object
      additionalProperties: false
    StaticWallet:
      properties:
        id:
          type: string
          description: Wallet id
          format: uuid
        orderId:
          type: string
          description: ID in the client's system (specified when creating a wallet)
        addresses:
          items:
            $ref: '#/components/schemas/ChainTokenStatic'
          type: array
          description: Wallet addresses for payment
      required:
        - id
        - orderId
        - addresses
      type: object
      additionalProperties: false
    UUID:
      type: string
      format: uuid
    CreateStaticWalletRequest:
      properties:
        orderId:
          type: string
          description: ID in the client's system
      required:
        - orderId
      type: object
      additionalProperties: false
    Rate:
      properties:
        name:
          type: string
        rate:
          type: string
      required:
        - name
        - rate
      type: object
      additionalProperties: false
    PaymentMethod:
      properties:
        chain:
          type: string
          description: Chain name
        token:
          type: string
          description: Token name
        methodName:
          type: string
          description: Payment method name (token + chain)
        icon:
          type: string
          description: Payment method icon
        chainIcon:
          type: string
          description: Chain icon
        tokenIcon:
          type: string
          description: Token icon
      required:
        - chain
        - token
        - methodName
        - icon
        - chainIcon
        - tokenIcon
      type: object
      additionalProperties: false
    PaymentMethods:
      properties:
        paymentMethods:
          items:
            $ref: '#/components/schemas/PaymentMethod'
          type: array
      required:
        - paymentMethods
      type: object
      additionalProperties: false
    InvoiceStatus:
      enum:
        - WAITING_SELECTION
        - WAITING_PAYMENT
        - COMPLETE
        - EXPIRED
        - OVER_PAID
        - UNDER_PAID
      type: string
    LastTransaction:
      properties:
        chain:
          type: string
          description: Chain name
        txid:
          type: string
          description: Transaction Hash
      required:
        - chain
        - txid
      type: object
      additionalProperties: false
    PaymentDetails:
      properties:
        chain:
          type: string
          description: Chain name
        token:
          type: string
          description: Token name
        address:
          type: string
          description: Payment address
        amount:
          type: string
          description: Expected payment amount in tokens
          format: decimal
      required:
        - chain
        - token
      type: object
      additionalProperties: false
    Invoice:
      properties:
        id:
          type: string
          description: Invoice id
          format: uuid
        orderId:
          type: string
          description: ID in the client's system (specified when creating an invoice)
        merchantName:
          type: string
          description: Merchant's name
        amount:
          type: string
          description: Original order amount in USD (excluding service fee)
          format: decimal
        paymentAmount:
          type: string
          description: Amount to pay in USD (excluding service fee if feeIncluded)
          format: decimal
        paidAmount:
          type: string
          description: Total amount actually paid by the customer in USD
          format: decimal
        feeIncluded:
          type: boolean
          description: >-
            If true, the service fee is added to paymentDetails.amount (paid by
            customer)
        accuracy:
          type: string
          description: >-
            Allowed payment deviation (0 to 0.05). If within range, status is
            COMPLETE
          format: decimal
        feeRate:
          type: string
          description: Service fee fraction (e.g., 0.02 for 2%)
          format: decimal
        expectedMerchantAmount:
          type: string
          description: Expected credit to merchant balance if paid 100%
          format: decimal
        merchantPaidAmount:
          type: string
          description: >-
            Actual amount already credited to merchant balance (paidAmount minus
            fee)
          format: decimal
        createdAt:
          type: string
          description: ISO 8601 creation date
          format: date-time
        expiredAt:
          type: string
          description: ISO 8601 expiration date
          format: date-time
        originalExpiredAt:
          type: string
          description: Recorded original expiration date if prolonged
          format: date-time
        canceledAt:
          type: string
          description: ISO 8601 cancellation date
          format: date-time
        status:
          $ref: '#/components/schemas/InvoiceStatus'
          description: Current invoice status
        url:
          type: string
          description: Public payment page link
          format: uri
        urlSuccess:
          type: string
          description: Redirect URL after successful payment
          format: uri
        urlReturn:
          type: string
          description: Redirect URL after failure (canceled or expired)
          format: uri
        supportLink:
          type: string
          description: Merchant's support contact link
          format: uri
        lastTransaction:
          $ref: '#/components/schemas/LastTransaction'
          description: Info about the most recent incoming transaction
        paymentDetails:
          $ref: '#/components/schemas/PaymentDetails'
          description: >-
            Information about the selected payment method and the amount to be
            paid.
      required:
        - id
        - orderId
        - merchantName
        - paidAmount
        - feeIncluded
        - accuracy
        - feeRate
        - expectedMerchantAmount
        - merchantPaidAmount
        - createdAt
        - expiredAt
        - status
        - url
      type: object
      additionalProperties: false
    ChainToken:
      properties:
        chain:
          type: string
          description: Chain name
        token:
          type: string
          description: Token name
      required:
        - chain
        - token
      type: object
      additionalProperties: false
    CreateInvoiceRequest:
      properties:
        orderId:
          type: string
          description: ID in the client's system
        amount:
          type: string
          description: >-
            Invoice amount in USD. If omitted, any payment amount will result in
            COMPLETE status
          format: decimal
          minimum: 0.01
        feeIncluded:
          type: boolean
          description: >-
            If the option is enabled, the service fee will be added to the
            amount.
          default: false
        accuracy:
          type: string
          description: >-
            What deviation from amount should still be marked COMPLETE. From 0
            to 0.05 where 0.05 is 5%
          format: decimal
          default: '0'
          minimum: 0
          maximum: 0.05
        urlSuccess:
          type: string
          description: Redirect after successful payment
          format: uri
        urlReturn:
          type: string
          description: Redirect after failure (canceled or expired)
          format: uri
        chainToken:
          $ref: '#/components/schemas/ChainToken'
          description: Selected chain and token
      required:
        - orderId
      type: object
      additionalProperties: false
    PatchInvoiceRequest:
      properties:
        amount:
          type: string
          description: Invoice amount, can only be set if not specified during creation
          format: decimal
        chainToken:
          $ref: '#/components/schemas/ChainToken'
          description: Chain and token, can only be set if not specified during creation
      type: object
      additionalProperties: false
    Invoices:
      properties:
        invoices:
          items:
            $ref: '#/components/schemas/Invoice'
          type: array
          description: Requested invoices
        totalCount:
          type: integer
          format: int32
          description: How many invoices in total (for pagination)
      required:
        - invoices
        - totalCount
      type: object
      additionalProperties: false
    GetHistoryRequest:
      properties:
        fromDate:
          type: string
          description: Start date for filtering in ISO 8601 format
          format: date-time
        toDate:
          type: string
          description: End date for filtering in ISO 8601 format
          format: date-time
        limit:
          type: integer
          format: int32
          description: Maximum number of items to output. No more than 1000.
          default: 1000
          maximum: 1000
        notNotified:
          type: boolean
          description: >-
            If specified, will return notifications that have not yet been
            acknowledged.
          default: false
      required:
        - fromDate
      type: object
      additionalProperties: false
    StaticWalletNotification:
      properties:
        id:
          type: string
          description: Wallet id
          format: uuid
        orderId:
          type: string
          description: ID in the client's system (specified when creating a wallet)
      required:
        - id
        - orderId
      type: object
      additionalProperties: false
    Transaction:
      properties:
        txid:
          type: string
          description: Transaction hash
        chain:
          type: string
          description: Chain name
        token:
          type: string
          description: Token name
        value:
          type: string
          description: Amount in tokens
          format: decimal
        usd:
          type: string
          description: Amount in USD, before deducting the commission
          format: decimal
        fee:
          type: string
          description: Service fee in USD
          format: decimal
        wallet:
          $ref: '#/components/schemas/StaticWalletNotification'
          description: Wallet info
        createdAt:
          type: string
          description: Payment processing date in ISO 8601 format
          format: date-time
        blockCreatedAt:
          type: string
          description: Date of funds sent in ISO 8601 format
          format: date-time
        merchantAmount:
          type: string
          description: >-
            Amount to be credited to the merchant, after deducting the
            commission
          format: decimal
        id:
          type: string
          description: Transaction id
          format: uuid
      required:
        - txid
        - chain
        - token
        - value
        - usd
        - fee
        - createdAt
        - blockCreatedAt
        - merchantAmount
        - id
      type: object
      additionalProperties: false
    Transactions:
      properties:
        transactions:
          items:
            $ref: '#/components/schemas/Transaction'
          type: array
          description: Requested transactions
        totalCount:
          type: integer
          format: int32
          description: How many transactions in total (for pagination)
      required:
        - transactions
        - totalCount
      type: object
      additionalProperties: false
  securitySchemes:
    api_key:
      type: apiKey
      name: X-Api-Key
      in: header
info:
  title: chiefpay-api
  version: 1.0.0
  license:
    name: MIT
    identifier: MIT
  contact:
    name: ChiefPay
    email: admin@chiefpay.org
    url: https://chiefpay.org
paths:
  /v1/wallet/{id}:
    get:
      operationId: GetWallet
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StaticWallet'
        '400':
          description: INVALID_ARGUMENT
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      tags:
        - wallet
      security: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            $ref: '#/components/schemas/UUID'
  /v1/wallet:
    post:
      operationId: CreateWallet
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StaticWallet'
        '400':
          description: INVALID_ARGUMENT
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: UNAUTHENTICATED
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                Example 1:
                  value:
                    code: UNAUTHENTICATED
                    errors:
                      - API key not provided
      tags:
        - wallet
      security:
        - api_key: []
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateStaticWalletRequest'
  /v1/rates:
    get:
      operationId: GetRates
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/Rate'
                type: array
      tags:
        - rates
      security: []
      parameters: []
  /v1/paymentMethods:
    get:
      operationId: GetPaymentMethods
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentMethods'
      tags:
        - paymentMethods
      security: []
      parameters: []
  /v1/invoice/{id}:
    get:
      operationId: GetInvoice
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Invoice'
        '400':
          description: INVALID_ARGUMENT
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: UNAUTHENTICATED
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                Example 1:
                  value:
                    code: UNAUTHENTICATED
                    errors:
                      - API key not provided
      tags:
        - invoice
      security: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            $ref: '#/components/schemas/UUID'
    patch:
      operationId: PatchInvoice
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Invoice'
        '400':
          description: INVALID_ARGUMENT
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: UNAUTHENTICATED
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                Example 1:
                  value:
                    code: UNAUTHENTICATED
                    errors:
                      - API key not provided
      tags:
        - invoice
      security: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            $ref: '#/components/schemas/UUID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchInvoiceRequest'
  /v1/invoice:
    post:
      operationId: CreateInvoice
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Invoice'
        '400':
          description: INVALID_ARGUMENT
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: UNAUTHENTICATED
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                Example 1:
                  value:
                    code: UNAUTHENTICATED
                    errors:
                      - API key not provided
      tags:
        - invoice
      security:
        - api_key: []
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateInvoiceRequest'
  /v1/invoice/{id}/cancel:
    post:
      operationId: CancelInvoice
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Invoice'
        '400':
          description: INVALID_ARGUMENT
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: UNAUTHENTICATED
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                Example 1:
                  value:
                    code: UNAUTHENTICATED
                    errors:
                      - API key not provided
      tags:
        - invoice
      security: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            $ref: '#/components/schemas/UUID'
  /v1/invoice/{id}/prolong:
    post:
      operationId: ProlongInvoice
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Invoice'
        '400':
          description: INVALID_ARGUMENT
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: UNAUTHENTICATED
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                Example 1:
                  value:
                    code: UNAUTHENTICATED
                    errors:
                      - API key not provided
      tags:
        - invoice
      security: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            $ref: '#/components/schemas/UUID'
  /v1/invoice/{id}/subscribe:
    get:
      operationId: SubscribeInvoice
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Invoice'
        '400':
          description: INVALID_ARGUMENT
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: UNAUTHENTICATED
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                Example 1:
                  value:
                    code: UNAUTHENTICATED
                    errors:
                      - API key not provided
      tags:
        - invoice
      security: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            $ref: '#/components/schemas/UUID'
  /v1/history/invoices:
    get:
      operationId: GetInvoices
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Invoices'
        '400':
          description: INVALID_ARGUMENT
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: UNAUTHENTICATED
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                Example 1:
                  value:
                    code: UNAUTHENTICATED
                    errors:
                      - API key not provided
      tags:
        - invoice
      security:
        - api_key: []
      parameters:
        - description: Start date for filtering in ISO 8601 format
          in: query
          name: fromDate
          required: true
          schema:
            type: string
        - description: End date for filtering in ISO 8601 format
          in: query
          name: toDate
          required: false
          schema:
            type: string
        - description: Maximum number of items to output. No more than 1000.
          in: query
          name: limit
          required: false
          schema:
            default: 1000
            format: int32
            type: integer
            maximum: 1000
        - description: >-
            If specified, will return notifications that have not yet been
            acknowledged.
          in: query
          name: notNotified
          required: false
          schema:
            default: false
            type: boolean
  /v1/history/transactions:
    get:
      operationId: GetTransactions
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Transactions'
        '400':
          description: INVALID_ARGUMENT
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: UNAUTHENTICATED
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                Example 1:
                  value:
                    code: UNAUTHENTICATED
                    errors:
                      - API key not provided
      tags:
        - wallet
      security:
        - api_key: []
      parameters:
        - description: Start date for filtering in ISO 8601 format
          in: query
          name: fromDate
          required: true
          schema:
            type: string
        - description: End date for filtering in ISO 8601 format
          in: query
          name: toDate
          required: false
          schema:
            type: string
        - description: Maximum number of items to output. No more than 1000.
          in: query
          name: limit
          required: false
          schema:
            default: 1000
            format: int32
            type: integer
            maximum: 1000
        - description: >-
            If specified, will return notifications that have not yet been
            acknowledged.
          in: query
          name: notNotified
          required: false
          schema:
            default: false
            type: boolean
servers:
  - url: https://api.chiefpay.org/
  - url: https://api_test.chiefpay.org/
